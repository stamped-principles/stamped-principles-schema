id: https://github.com/stamped-principles/stamped-principles-schema
name: stamped-principles
title: STAMPED Principles Schema
description: >-
  LinkML schema defining the canonical STAMPED principles for computational
  reproducibility research objects. Each principle is identified by a short
  code (category letter + ordinal) and carries a normative statement and
  RFC 2119 requirement level.
license: CC-BY-4.0
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  rfc2119: https://datatracker.ietf.org/doc/html/rfc2119
  stamped: https://github.com/stamped-principles/stamped-principles-schema/

imports:
  - linkml:types

types:
  PrincipleCode:
    uri: xsd:string
    base: str
    description: >-
      Canonical short identifier for a STAMPED principle
      (category letter + "." + positive integer), e.g. "S.1".
    pattern: "^[A-Z]\\.[1-9][0-9]*$"

enums:
  RequirementLevel:
    description: >-
      RFC 2119 requirement levels. Negated forms (MUST NOT / SHOULD NOT) are
      represented using `must` / `should`; negation is expressed in the
      principle statement text.
    permissible_values:
      must:
        title: MUST
        description: Absolute requirement (including MUST NOT statements).
        meaning: rfc2119:#section-1
      should:
        title: SHOULD
        description: Strong recommendation (including SHOULD NOT statements).
        meaning: rfc2119:#section-3
      may:
        title: MAY
        description: Optional / permissible.
        meaning: rfc2119:#section-5

  PrincipleCategory:
    description: High-level STAMPED principle categories.
    permissible_values:
      self_contained:
        title: Self-contained
        description: Everything under one boundary.
      tracked:
        title: Tracked
        description: Version control & provenance.
      actionable:
        title: Actionable
        description: Executable & documented workflows.
      modular:
        title: Modular
        description: Independent & composable modules.
      portable:
        title: Portable
        description: Runs anywhere with explicit specifications.
      ephemeral:
        title: Ephemeral
        description: Transient compute environment.
      distributable:
        title: Distributable
        description: Shareable, persistent, and retrievable.

classes:
  Principle:
    description: A single STAMPED principle.
    class_uri: schema:DefinedTerm
    id_prefixes:
      - stamped
    attributes:
      code:
        description: >-
          Canonical short identifier for the principle, consisting of a
          single capital letter (category) followed by a period and a
          positive integer (ordinal within the category), e.g., "S.1".
        slot_uri: schema:termCode
        range: PrincipleCode
        identifier: true
        required: true
      category:
        description: High-level STAMPED category this principle belongs to.
        slot_uri: schema:inDefinedTermSet
        range: PrincipleCategory
        required: true
      level:
        description: RFC 2119 requirement level of the principle.
        range: RequirementLevel
        required: true
      statement:
        description: Normative statement of the principle.
        slot_uri: skos:definition
        range: string
        required: true

  PrincipleSet:
    description: >-
      The full, versioned set of STAMPED principles.
    tree_root: true
    class_uri: schema:DefinedTermSet
    attributes:
      version:
        description: Version string for this set of principles (e.g., "1.0.0").
        slot_uri: schema:version
        range: string
        required: true
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      principles:
        description: The principles in this set.
        slot_uri: schema:hasDefinedTerm
        range: Principle
        multivalued: true
        inlined_as_list: true
        required: true
        minimum_cardinality: 1
